# Alembic Configuration File for NiceMeta
# This is the Python equivalent of Flyway's flyway.conf

[alembic]
# Path to migration scripts
script_location = src/nicemeta/core/migrations

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Truncate long revision identifiers
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
sourceless = false

# Version path separator
version_path_separator = os

# Output encoding
output_encoding = utf-8

# Database URL - will be overridden by env.py to use settings
# sqlalchemy.url is set programmatically in env.py
sqlalchemy.url = 

[post_write_hooks]
# Hooks to run after generating revision files

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

