# NiceMeta — 3-service stack (frontend / backend / python-engine)
#
# Usage (from the repo root):
#   cp docker/.env.example docker/.env   # then edit ANTHROPIC_API_KEY
#   docker compose -f docker/docker-compose.yml --env-file docker/.env up --build
#
# Open http://localhost:8080
#
# Volumes:
#   nicemeta-data       — backend SQLite DB (users, queries, viz metadata)
#   nicemeta-workspace  — git-backed workspace for saved collections

services:
  engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile.engine
    image: nicemeta/engine:local
    environment:
      PYTHON_ENGINE_HOST: "0.0.0.0"
      PYTHON_ENGINE_PORT: "8765"
      PYTHON_ENGINE_TOKEN: "${PYTHON_ENGINE_TOKEN:-dev-engine-token}"
    expose:
      - "8765"
    networks:
      - nicemeta
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: nicemeta/backend:local
    environment:
      PORT: "3691"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      PYTHON_ENGINE_URL: "http://engine:8765"
      PYTHON_ENGINE_TOKEN: "${PYTHON_ENGINE_TOKEN:-dev-engine-token}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-opus-4-7}"
      DATABASE_FILE: "/data/nicemeta.sqlite"
      CORS_ORIGIN: "http://localhost:${FRONTEND_PORT:-8080}"
      NICEMETA_WORKSPACE_DIR: "/workspace"
    volumes:
      - nicemeta-data:/data
      - nicemeta-workspace:/workspace
    expose:
      - "3691"
    depends_on:
      - engine
    networks:
      - nicemeta
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    image: nicemeta/frontend:local
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - nicemeta
    restart: unless-stopped

volumes:
  nicemeta-data:
    name: nicemeta-data
  nicemeta-workspace:
    name: nicemeta-workspace

networks:
  nicemeta:
    name: nicemeta-network
    driver: bridge
